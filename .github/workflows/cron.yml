name: Luna daily cron
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codebase
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run hardened daily cron trigger
        env:
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL || 'https://lunalife.app' }}
          CRON_SECRET: ${{ secrets.CRON_SECRET || 'luna_super_secret_cron_token_2026' }}
          DEBUG: "true"
        run: node scripts/trigger-cron.mjs
